<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TimeFlow | My Approvals</title>
  <link rel="stylesheet" href="style.css" />
  <script src="api.js"></script>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">T</div>
        <div>
          <h1>TimeFlow</h1>
          <p>Timesheet prototype</p>
        </div>
      </div>

      <nav class="nav-list">
        <a class="nav-item" href="dashboard.html">Dashboard</a>
        <a class="nav-item" href="timesheets.html">Timesheets</a>
        <a class="nav-item" href="expenses.html">Expenses</a>
        <a class="nav-item" href="allocations.html">Allocations</a>
        <a class="nav-item" href="projects.html">Projects</a>
        <a class="nav-item active" href="approvals.html">Approvals</a>
        <a class="nav-item" href="reports.html">Reports</a>
      </nav>

      <div>
        <h2>Quick links</h2>
        <div class="link-list">
          <div class="link-item">
            <strong>Pending review</strong>
            <span id="sb-pending">—</span>
          </div>
          <div class="link-item">
            <strong>Approved this period</strong>
            <span id="sb-approved">—</span>
          </div>
        </div>
      </div>

      <div style="margin-top: auto;">
        <div style="padding:10px 0 8px; border-top:1px solid var(--border); margin-bottom:6px;"><div style="font-size:0.72rem; color:var(--muted); margin-bottom:2px;">Signed in as</div><div class="js-user-name" style="font-size:0.85rem; font-weight:600; color:var(--text);">—</div></div><a href="#" onclick="signOut(); return false;" class="btn-signout">Sign out</a>
      </div>
    </aside>

    <main class="content">
      <section class="topbar">
        <div>
          <h1 class="page-title">My Approvals</h1>
          <p style="margin: 8px 0 0; color: var(--muted);">Track the review status of your submitted timesheets.</p>
        </div>
        <div class="topbar-meta">
          <div class="chip" id="pending-chip">— pending</div>
        </div>
      </section>

      <!-- Filter tabs -->
      <div class="view-tabs" style="margin-bottom: 16px;">
        <button class="view-tab active" onclick="filterSubmissions('all', this)">All</button>
        <button class="view-tab" onclick="filterSubmissions('Submitted', this)">Pending</button>
        <button class="view-tab" onclick="filterSubmissions('Approved', this)">Approved</button>
        <button class="view-tab" onclick="filterSubmissions('Rejected', this)">Rejected</button>
      </div>

      <div id="submissions-list" style="display:flex; flex-direction:column; gap:12px;"></div>
    </main>
  </div>

  <script>
    let _allSubmissions = [];
    let _projectsById = {};

    const STATUS_DISPLAY = { not_started: 'Not Started', draft: 'Draft', submitted: 'Submitted', approved: 'Approved', rejected: 'Rejected' };
    const statusClass   = { Submitted: 'status-pending', Approved: 'status-approved', Rejected: 'status-draft', Draft: 'status-draft', 'Not Started': 'status-draft' };
    const statusLabel   = { Submitted: 'Pending Review', Approved: 'Approved', Rejected: 'Rejected', Draft: 'Draft', 'Not Started': 'Not Submitted' };

    async function _loadApprovals() {
      const projects = await apiFetch('/projects/').catch(() => []);
      _projectsById = Object.fromEntries((projects || []).map(p => [String(p.id), p.name]));

      // Fetch last 8 weeks
      const mondays = [];
      let mon = mondayOf();
      for (let i = 0; i < 8; i++) {
        mondays.push(new Date(mon));
        mon = new Date(mon);
        mon.setDate(mon.getDate() - 7);
      }

      const results = await Promise.all(
        mondays.map(w => apiFetch(`/timesheets/?week_start=${isoDate(w)}`).catch(() => null))
      );

      _allSubmissions = results
        .map((ts, i) => {
          if (!ts) return null;
          const status   = STATUS_DISPLAY[ts.status?.toLowerCase()] || 'Draft';
          const total    = (ts.entries || []).reduce((s, e) => s + e.hours, 0);
          const billable = (ts.entries || []).filter(e => e.billable).reduce((s, e) => s + e.hours, 0);
          if (status === 'Not Started' && total === 0) return null;
          const projNames = [...new Set((ts.entries || []).map(e => _projectsById[String(e.project_id)]).filter(Boolean))];
          const friday = new Date(mondays[i]);
          friday.setDate(friday.getDate() + 4);
          const submittedOn = (status !== 'Draft' && status !== 'Not Started')
            ? friday.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
            : null;
          return { week: weekLabel(mondays[i]), hours: total, billable, status, submittedOn, projects: projNames, rejectNote: ts.reject_note || null };
        })
        .filter(Boolean);

      const pending  = _allSubmissions.filter(s => s.status === 'Submitted').length;
      const approved = _allSubmissions.filter(s => s.status === 'Approved').length;
      document.getElementById('sb-pending').textContent  = pending + ' week' + (pending !== 1 ? 's' : '');
      document.getElementById('sb-approved').textContent = approved + ' week' + (approved !== 1 ? 's' : '');
      document.getElementById('pending-chip').textContent = pending + ' pending';

      renderSubmissions('all');
    }

    function filterSubmissions(filter, btn) {
      document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      renderSubmissions(filter);
    }

    function renderSubmissions(filter) {
      const list = document.getElementById('submissions-list');
      list.innerHTML = '';
      const filtered = filter === 'all' ? _allSubmissions : _allSubmissions.filter(s => s.status === filter);

      if (filtered.length === 0) {
        list.innerHTML = `<div class="panel" style="color:var(--muted); font-size:0.9rem; padding:8px 0;">No entries for this filter.</div>`;
        return;
      }

      filtered.forEach(s => {
        const util    = s.hours > 0 ? Math.round((s.billable / s.hours) * 100) : 0;
        const nonBill = +(s.hours - s.billable).toFixed(1);
        const card = document.createElement('div');
        card.className = 'panel';
        card.innerHTML = `
          <div style="display:flex; align-items:center; gap:16px; flex-wrap:wrap;">
            <div style="flex:1; min-width:160px;">
              <div style="font-weight:700; font-size:0.95rem; color:#102a43;">${s.week}</div>
              <div style="font-size:0.8rem; color:var(--muted); margin-top:3px;">
                ${s.submittedOn ? `Submitted ${s.submittedOn} · ` : ''}${s.projects.length ? s.projects.join(', ') : 'No entries logged'}
              </div>
            </div>
            <div style="display:flex; gap:24px; align-items:center; flex-wrap:wrap;">
              <div style="text-align:center;">
                <div style="font-size:1.05rem; font-weight:800; color:#102a43;">${s.hours}h</div>
                <div style="font-size:0.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.04em;">Total</div>
              </div>
              <div style="text-align:center;">
                <div style="font-size:1.05rem; font-weight:800; color:var(--accent);">${s.billable}h</div>
                <div style="font-size:0.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.04em;">Billable</div>
              </div>
              <div style="text-align:center;">
                <div style="font-size:1.05rem; font-weight:800; color:#102a43;">${util}%</div>
                <div style="font-size:0.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.04em;">Utilization</div>
              </div>
              <span class="status-pill ${statusClass[s.status] || 'status-draft'}">${statusLabel[s.status] || s.status}</span>
            </div>
          </div>
          <div style="margin-top:12px; padding-top:12px; border-top:1px solid var(--border); display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
            ${s.status === 'Approved' ? `
              <span style="font-size:0.78rem; color:var(--muted);">Reviewed by your manager</span>
              <span style="margin-left:auto; font-size:0.82rem; color:#16a34a; font-weight:600;">✓ Approved</span>
            ` : ''}
            ${s.status === 'Submitted' ? `
              <span style="font-size:0.78rem; color:var(--muted);">Awaiting manager review</span>
              <a href="timesheets.html" style="margin-left:auto; font-size:0.82rem; color:var(--accent); font-weight:600; text-decoration:none;">View timesheet →</a>
            ` : ''}
            ${s.status === 'Rejected' ? `
              <span style="font-size:0.78rem; color:#dc2626; font-weight:600;">✗ Rejected by your manager</span>
              ${s.rejectNote ? `<span style="font-size:0.78rem; color:#dc2626; margin-left:8px;">— "${s.rejectNote}"</span>` : ''}
              <a href="timesheets.html" style="margin-left:auto; font-size:0.82rem; color:var(--accent); font-weight:600; text-decoration:none;">Resubmit →</a>
            ` : ''}
            ${s.status === 'Draft' ? `
              <span style="font-size:0.78rem; color:var(--muted);">Not yet submitted</span>
              <a href="timesheets.html" style="margin-left:auto; font-size:0.82rem; color:var(--accent); font-weight:600; text-decoration:none;">Submit timesheet →</a>
            ` : ''}
          </div>`;
        list.appendChild(card);
      });
    }

    document.addEventListener('DOMContentLoaded', async () => {
      if (!requireAuth()) return;
      await _loadApprovals();
    });
  </script>
</body>
</html>
